name: Launch OCI Instance

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  launch:
    runs-on: ubuntu-latest
    name: Try to launch OCI A1 instance
    steps:
      - uses: actions/checkout@v3

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          echo "$OCI_KEY_CONTENT" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
        env:
          OCI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_FILENAME }}

      - name: Debug secret lengths
        run: |
          echo "OCI_REGION_LEN=${#OCI_REGION}"
          echo "OCI_USER_ID_LEN=${#OCI_USER_ID}"
          echo "OCI_TENANCY_ID_LEN=${#OCI_TENANCY_ID}"
          echo "OCI_KEY_FINGERPRINT_LEN=${#OCI_KEY_FINGERPRINT}"
          echo "OCI_SUBNET_ID_LEN=${#OCI_SUBNET_ID}"
          echo "OCI_IMAGE_ID_LEN=${#OCI_IMAGE_ID}"
          echo "OCI_AVAILABILITY_DOMAIN_LEN=${#OCI_AVAILABILITY_DOMAIN}"
          echo "OCI_SSH_PUBLIC_KEY_LEN=${#OCI_SSH_PUBLIC_KEY}"
          echo "OCI_SHAPE_PREFIX=${OCI_SHAPE:0:8}"
          echo "OCI_REGION_PREFIX=${OCI_REGION:0:3}"
          echo "OCI_REGION_SUFFIX=${OCI_REGION: -3}"
          echo "PRIVATE_KEY_LINES=$(wc -l < ~/.oci/oci_api_key.pem)"
          head -1 ~/.oci/oci_api_key.pem
          tail -1 ~/.oci/oci_api_key.pem
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}

      - name: Run launch script
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /home/runner/.oci/oci_api_key.pem
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_BOOT_VOLUME_SIZE_IN_GBS: ${{ secrets.OCI_BOOT_VOLUME_SIZE_IN_GBS }}
